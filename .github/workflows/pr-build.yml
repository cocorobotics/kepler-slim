name: PR build check

# On every PR targeting master, build the slim bundle from the PR branch and
# fail if it doesn't build cleanly. No releases are published.
on:
  pull_request:
    branches: [master]

# Cancel superseded runs for the same PR.
concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Yarn 4
        run: corepack enable && corepack prepare yarn@4.4.0 --activate

      - name: Install dependencies
        run: yarn install --immutable
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Wire workspaces to source
        run: yarn workspaces foreach -At run stab

      - name: Build slim UMD bundle
        run: yarn build:umd:slim

      - name: Verify output
        run: |
          set -euo pipefail
          test -f umd/keplergl.slim.min.js
          node --check umd/keplergl.slim.min.js
          BYTES=$(wc -c < umd/keplergl.slim.min.js)
          printf 'slim bundle: %s bytes (%.2f MB)\n' "$BYTES" "$(echo "scale=2;$BYTES/1048576" | bc)"

      - name: Upload built bundle
        uses: actions/upload-artifact@v4
        with:
          name: keplergl-slim
          path: umd/keplergl.slim.min.js
          if-no-files-found: error
